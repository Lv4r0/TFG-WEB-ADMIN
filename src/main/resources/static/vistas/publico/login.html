<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Lynca - Iniciar Sesión</title>
    <link rel="stylesheet" href="/estilos/estilos.css">
</head>
<body class="login-body">

    <div class="login-card">
        <h1>LYNCA</h1>
        <p>Introduce tus credenciales para acceder</p>

        <form id="loginForm">
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="email" placeholder="ejemplo@lynca.com" required>
            </div>
            
            <div class="form-group">
                <label>Contraseña</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>

            <button type="submit" class="btn-login">Entrar al Sistema</button>

            <button type="button" 
                    onclick="window.location.href='registro-entidad.html'" 
                    class="btn-login" 
                    style="margin-top: 10px;">
                Registrarse como Entidad
            </button>
            
            <p id="errorMsg" class="error-text" style="display: none;">❌ Usuario no encontrado o sin permisos.</p>
        </form>
    </div>

    <script src="/scripts/app.js"></script>
</body>
</html>
