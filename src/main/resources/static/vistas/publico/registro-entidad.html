<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Lynca - Registro de Entidad</title>
    <link rel="stylesheet" href="/estilos/estilos.css">
</head>
<body class="login-body"> <div class="login-card" style="max-width: 500px;">
        <h1>Unirse a LYNCA</h1>
        <p>Solicita el alta para tu Ayuntamiento o Club Deportivo</p>

        <form id="registroEntidadForm">
            <div class="form-group">
                <label>Nombre de la Entidad</label>
                <input type="text" id="regNombre" placeholder="Ej: Ayuntamiento de Alicante" required>
            </div>
            <div class="form-group">
                <label>CIF / NIF</label>
                <input type="text" id="regCif" placeholder="P0301400G" required>
            </div>
            <div class="form-group">
                <label>Email de Contacto Oficial</label>
                <input type="email" id="regEmail" placeholder="deportes@ayto.es" required>
            </div>
            <div class="form-group">
                <label>Contraseña de Acceso</label>
                <input type="password" id="regPassword" placeholder="••••••••" required>
            </div>

            <button type="submit" class="btn-login">Enviar Solicitud</button>
            <a href="login.html" style="display:block; margin-top:15px; color:#666; font-size:0.8rem;">Volver al Login</a>
        </form>
    </div>

    <script src="/scripts/app.js"></script>
</body>
</html>
